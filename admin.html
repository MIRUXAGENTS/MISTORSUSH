<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Админка Sushi Ashkelon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f4f4f4;
        }

        .item {
            background: white;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        .on {
            color: green;
            font-weight: bold;
        }

        .off {
            color: red;
            font-weight: bold;
        }

        button {
            cursor: pointer;
            padding: 5px 10px;
        }
    </style>
</head>

<body>
    <h1>🍣 Управление меню (Ашкелон)</h1>
    <div id="status-msg" style="color: blue;">Связь с базой...</div>
    <div id="menu-list"></div>

    <script>
        const S_URL = 'https://laqbtwzothmkdjapstkq.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhcWJ0d3NvdGhta2RqYXBzdGtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjE0ODYsImV4cCI6MjA4OTgzNzQ4Nn0.ye0QGkypstTfxGjCkytn_x7bwsa-2tNiq3EIEulsvV0';
        const sb = supabase.createClient(S_URL, S_KEY);

        async function load() {
            const { data, error } = await sb.from('products').select('*').order('id');
            if (error) {
                document.getElementById('status-msg').innerHTML = "<b style='color:red'>Ошибка: " + error.message + "</b>";
                return;
            }
            document.getElementById('status-msg').innerHTML = "✅ Данные загружены!";
            document.getElementById('menu-list').innerHTML = data.map(p => `
                <div class="item">
                    <span>${p.name} — <b>${p.price} ₪</b> 
                        <span class="${p.is_available ? 'on' : 'off'}">${p.is_available ? '[Вкл]' : '[Выкл]'}</span>
                    </span>
                    <button onclick="toggle(${p.id}, ${p.is_available})">Изменить статус</button>
                </div>
            `).join('');
        }

        async function toggle(id, current) {
            await sb.from('products').update({ is_available: !current }).eq('id', id);
            load();
        }

        load();
    </script>
</body>

</html>
